services:
  postgres:
    image: postgres:18.3-alpine
    container_name: renice-db
    environment:
      POSTGRES_USER: ${DB_USER:-renice}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-renice_ice_can_do_this}
      POSTGRES_DB: ${DB_NAME:-renice_sl}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8.6-alpine
    container_name: renice-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-renice_redis_change_me}

  nats:
    image: nats:2.12.6-alpine
    container_name: renice-nats
    command: ["-js"]
    volumes:
      - nats_data:/data

volumes:
  pgdata:
  nats_data: