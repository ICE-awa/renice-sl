apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: renice-sl-ingress
  namespace: renice-sl
spec:
  ingressClassName: nginx
  rules:
    - host: renice.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: renice-sl-web
                port:
                  number: 3000
