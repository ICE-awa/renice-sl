apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: renice-sl
spec:
  selector:
    app: nats
  ports:
    - name: nats
      port: 4222
      targetPort: 4222
    - name: monitoring
      port: 8222
      targetPort: 8222
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-data
  namespace: renice-sl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: renice-sl
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.9-alpine
          ports:
            - containerPort: 4222
            - containerPort: 8222
          args:
            - -js
            - -sd
            - /data
            - -m
            - "8222"
          volumeMounts:
            - name: nats-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: nats-data
          persistentVolumeClaim:
            claimName: nats-data
