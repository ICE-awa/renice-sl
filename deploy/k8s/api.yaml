apiVersion: apps/v1
kind: Deployment
metadata:
  name: renice-sl-api
  namespace: renice-sl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: renice-sl-api
  template:
    metadata:
      labels:
        app: renice-sl-api
    spec:
      containers:
        - name: renice-sl-api
          image: ghcr.io/ice-awa/renice-sl-server:v0.0.4
          imagePullPolicy: IfNotPresent
          command: ["./api"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: renice-sl-config
            - secretRef:
                name: renice-sl-secret
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: renice-sl-api
  namespace: renice-sl
spec:
  selector:
    app: renice-sl-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
